  <body>
    <div class="enq">
      <p class="fak">For any kind of query, fill the form below-</p>
      <br />
      <form action="/form_submit_info/">
        <label
          >Name:&nbsp; &nbsp;
          <input
            type="text"
            name="name"
            id="name"
            minlength="3"
            maxlength="30"
            required
          /> </label
        ><br /><br />
        <label
          >Email id:
          <input
            type="email"
            name="name"
            id="Email"
            minlength="11"
            maxlength="45"
            required
          /> </label
        ><br /><br />

        <label for="State">State:</label>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        <select name="State" id="State" required>
          <option>Select your state</option>
          <option value="1">Uttar Pradesh</option>
          <option value="2">Delhi</option>
          <option value="3">Madhya Pradesh</option>
          <option value="4">Maharashtra</option>
          <option value="5">Gujarat</option>
          <option value="6">Karnataka</option>
          <option value="7">Rajasthan</option>
          <option value="8">Haryana</option>
          <option value="9">Other State</option></select
        ><br /><br />
        <label>Query type: </label>
        <label class="r1"
          ><input
            type="radio"
            name="query ty"
            id="resume-related"
            required
          />Resume related</label
        >

        <label class="r2"
          ><input
            type="radio"
            name="query ty"
            id="other"
            required
          />Other</label
        >
        <br /><br />
        <div class="bb">
          <div class="d1"><label for="name">Your Query:</label></div>
          &nbsp;
          <div class="d2">
            <textarea
              name="name"
              placeholder="Write down your query here"
            ></textarea>
          </div>
        </div>

        <button id="fosu">Submit</button>

        <br /><br />
      </form>
    </div>
    <div class="footer"></div>
